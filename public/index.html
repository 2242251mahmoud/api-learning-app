<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Learning App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Task Tracker API App</h1>
      <p>A simple useful app that shows how real apps call APIs.</p>

      <section class="card">
        <h2>Add Task</h2>
        <label for="taskInput">Task title:</label>
        <input id="taskInput" type="text" placeholder="Example: Pay electricity bill" />
        <button id="addTaskBtn">Add task (POST)</button>
        <p id="formMessage" class="message"></p>
      </section>

      <section class="card">
        <h2>Tasks</h2>
        <div class="filters">
          <button class="filterBtn active" data-filter="all">All</button>
          <button class="filterBtn" data-filter="open">Open</button>
          <button class="filterBtn" data-filter="done">Done</button>
        </div>
        <ul id="taskList" class="taskList"></ul>
        <p id="emptyState" class="muted">No tasks yet.</p>
      </section>

      <section class="card">
        <h2>API Response Preview</h2>
        <pre id="apiOut">Load tasks to see JSON response data.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
